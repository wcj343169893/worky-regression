# Audit 測試帳號（role_id=10，固定碼 9527）
# 來源：worky_next_v30x DB
#
# **重要**：承攬制下，「發案者」與「接案者」都是 Labor（user_type=2）
# 而非商家（user_type=1）。所有 /contract/* endpoint 都繼承 LaborApiController。
#
# Audit role 必要條件：s_labor_roles.role_id=10 AND published=1
# 目前合格：id=214 (profile 未填), 236 (complete), 276 (complete)

publisher_primary:
  id: 236
  phone: "0923120600"
  username: "886923120600"
  user_type: 2
  is_profile_complete: 1

receiver_primary:
  id: 276
  phone: "0923113000"
  username: "886923113000"
  user_type: 2
  is_profile_complete: 1

# 第三個 audit labor，留作未來需要 multi-receiver 場景時用
receiver_backup:
  - id: 214
    phone: "0900000001"
    is_profile_complete: 0    # profile 未填，部份 endpoint 可能擋

# 工作系統的「多夥伴」帳號改由 **帳號池(qa_accounts)** 按能力配發，不再寫死於此檔。
# 種子 id 與供給邏輯見 src/worky_regression/qa_accounts.py（SEED_LABOR_IDS / provision）。
# 執行期 runner 從池取「verified+profile_complete+audit_role+active+clean」的 labor，
# 不直連工作庫挑帳號。供給/同步：python -m worky_regression.qa_accounts provision

# === 商家（user_type=1）：「工作」系統用 ===
# 工作系統雇主=商家(user_type=1)、勞工=打工夥伴(user_type=2)，與承攬制不同。
# v31x 原本沒有任何雇主，此帳號由 scripts/bootstrap_job_env.py 從 v30x 複製而來
# （雇主 129 + AUDIT_USER 角色 + 主店鋪 70）。重建請跑該腳本。
employer_primary:
  id: 129
  phone: "0923113000"           # 與 receiver 276 同號但不同 user_type，互不衝突
  username: "886923113000"
  user_type: 1
  shop_id: 70                    # 已驗證店鋪（validation_type=2）

# 「工作」流程的打工夥伴沿用既有 audit labor：
#   - 申請者用 publisher_primary(236) 或 receiver_primary(276) 皆可（都是 audit labor）
