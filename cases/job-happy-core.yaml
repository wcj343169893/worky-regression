id: job-happy-core
skip: true
skip_reason: "時間鎖：打卡/任務開始結束需落在時段內，後端強制 start_time≥now+24h；禁 db_exec(#4)後無 API 可壓縮時間，需真實等待 24h+。"
description: >
  「工作」系統核心 happy path：商家發佈工作 → 打工夥伴申請上工 → 商家同意上工。
  三層驗證 HTTP / 推播 / DB 副作用。打卡與結算（J5/J6）因需時間與打卡碼操作，
  之後另開 path（會用 db_exec 把 start_at 拉到當下並寫 start_code）。

path:
  # J1 商家發佈工作（status=1 媒合中），存下 job_sn
  - transition: J1_employer_publish_job
    save:
      job_sn: job_sn_list.0
    expect:
      http: 200
      # 改打查詢接口驗證（取代讀 s_jobs.status）；info 不暴露 status，驗等價暴露欄位 recruited_count=0。
      api:
        query: Q_employer_job_info
        equals:
          recruited_count: 0             # 剛發佈、媒合中、尚無人錄取

  # 前置(guard→setup)：清掉夥伴殘留的「上工」工作，繞 30207 時段重疊 / 30229 同店同日
  - db_exec: >
      UPDATE s_labor_jobs SET status = 8
      WHERE labor_id = {{labor.user_id}} AND status = 1 AND end_at > UNIX_TIMESTAMP()
    expect_min_affected: 0

  # J2 打工夥伴申請上工 → 商家收 LABOR_JOB_APPLY_V2(10025)；夥伴媒合清單該 job status=4
  - transition: J2_labor_apply
    expect:
      http: 200
      push:
        # 推播給 employer（pushes_to=employer）
      # 改打夥伴媒合清單接口驗證（取代讀 s_labor_match_jobs）：找到該 job 的媒合，status=4=申請
      api:
        query: Q_labor_job_matches
        find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
        equals:
          status: 4                      # STATUS_LABOR_APPLY（夥伴已申請）

  # J3 商家同意上工 → 打工夥伴收 EMPLOYER_ACCEPT_APPLY(20016)；夥伴媒合清單該 job status=6
  - transition: J3_employer_accept
    expect:
      http: 200
      push:
        # 推播給 labor（pushes_to=labor）
      # 改打夥伴媒合清單接口驗證（取代讀 s_labor_jobs）：被錄取 → 媒合 status=6=商家錄取
      api:
        query: Q_labor_job_matches
        find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
        equals:
          status: 6                      # STATUS_EMPLOYER_ACCEPT（商家已錄取＝上工）
