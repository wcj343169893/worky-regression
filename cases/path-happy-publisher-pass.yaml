# Path: 完整 happy path（發案者最終通過接案者任務完成請求）
# 覆蓋 5 個 PusherOfTask 重構的事件：
#   T2  AfterReceiverApplyTaskEvent   → publisher 收 push (CONTRACT_RECEIVER_APPLY 20038)
#   T3a AfterAcceptReceiverApplyEvent → receiver  收 push (CONTRACT_RECEIVER_APPLY_ACCEPTED 20051)
#   T6  AfterReceiverStartTaskEvent   → publisher 收 push (CONTRACT_PUBLISHER_NOTIFY_TASK_START 20048)
#   T7  AfterReceiverEndTaskEvent     → publisher 收 push (CONTRACT_PUBLISHER_NOTIFY_TASK_END 20049)
#   T8  AfterPassReceiverTaskEvent    → receiver  收 push (CONTRACT_RECEIVER_TASK_SUCCESS 20057)
#
# 注意：使用 FunPoint 信用卡（payment_method_id=1）。publisher 236 已預先綁卡，
# dev 環境會自動扣款，避免 ATM 那條「等待付款」的卡關。
id: path-happy-publisher-pass
skip: true
skip_reason: "時間鎖：打卡/任務開始結束需落在時段內，後端強制 start_time≥now+24h；禁 db_exec(#4)後無 API 可壓縮時間，需真實等待 24h+。"
description: "承攬制完整 happy path：發 → 申 → 同 → 開始 → 結束 → 通過"

path:
  - transition: T1_publisher_publish_task
    save:
      task_sn: task_sn
    expect:
      http: 200

  - transition: T2_receiver_apply
    expect:
      http: 200

  - transition: T3a_publisher_accept_apply
    expect:
      http: 200

  # 橋接：dev FunPoint 不真扣款 + T1 發佈須 24h 後開始，故標記已付款並把時段拉回當下
  # （T6 需 pay_status=102 且 end_at>now；T7 需 start_at<=now）。詳見 path-contract-happy-green.yaml
  - db_exec: >
      UPDATE s_contract_tasks
      SET pay_status=102,
          start_at=UNIX_TIMESTAMP()-60,
          end_at=UNIX_TIMESTAMP()+3600
      WHERE task_sn='{{state.task_sn}}'
    flush_cache: true

  - transition: T6_receiver_start_task
    expect:
      http: 200

  # receiver 連續操作 1s 節流（9002），T6→T7 需間隔 > 1s
  - sleep: 2

  - transition: T7_receiver_end_task
    expect:
      http: 200

  - transition: T8_publisher_pass_task
    expect:
      http: 200
