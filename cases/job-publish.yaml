id: job-publish
description: 商家發佈今天 15:30 的一筆工作（過當日發佈時限則自動順延隔天 15:30）
vars:
  job_start_time_of_day: '15:30'
  job_work_minutes: 120
path:
- transition: J1_employer_publish_job
  save:
    job_sn: job_sn_list.0
  expect:
    http: 200
    # 改打對應查詢接口驗證（取代讀 s_jobs.status）。info 不對外暴露 status 欄，
    # 改驗等價的暴露欄位：查得到該 job(success) 即證明已發佈，且剛發佈 recruited_count=0（媒合中、尚無人錄取）。
    api:
      query: Q_employer_job_info
      equals:
        recruited_count: 0
