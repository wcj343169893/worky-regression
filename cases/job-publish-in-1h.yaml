id: job-publish-in-1h
description: 商家發佈一則 1 小時後的工作（開始時間＝當前時間 + 1 小時）
vars:
  job_start_after_minutes: 60
  job_work_minutes: 120
path:
- transition: J1_employer_publish_job
  save:
    job_sn: job_sn_list.0
  expect:
    http: 200
    # 改打對應查詢接口驗證（取代讀 s_jobs.status）。info 不暴露 status，
    # 改驗等價暴露欄位：查得到該 job 即證明已發佈，剛發佈 recruited_count=0（媒合中、尚無人錄取）。
    api:
      query: Q_employer_job_info
      equals:
        recruited_count: 0
