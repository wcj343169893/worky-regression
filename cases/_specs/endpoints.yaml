# =============================================================================
# endpoints.yaml — 介面 / 最小任務單元「單一真實來源」
# =============================================================================
# 本檔同時是三件事：
#   ① 人讀的 endpoint 規格（request / response / 前置 / DB 副作用 / push）
#   ② runner 的 transition registry 來源（registry.py 載入後建 Transition）
#   ③ AI 分解器的「任務單元菜單」（decomposer 把用例拆成這些單元的序列）
#
# 取代舊的 transitions.py / job_transitions.py / push_type_ids.py / job_push_type_ids.py
# （那些已改為從本檔 re-export，消除 CLAUDE.md 抱怨的「改兩個檔」同步負擔）。
#
# 維護規矩：
#   - 加 transition / 改 enum，只動這一個檔。
#   - endpoint 路徑以 /www/wwwroot/worky/documents/api/ 為準。
#   - push type_id 以 worky common/components/PushNotification/Type.php 為準。
#   - side_effects 的 enum 數值務必對齊主倉 model 常量（附常量名方便回查）。
# =============================================================================
version: 1

# ----- 兩套狀態機 -----
systems:
  contract:
    label: 承攬制審批流
    note: 雙方皆 Labor（user_type=2），publisher 與 receiver 輪流推進。
    roles:
      publisher: 發案者（Labor user_type=2）
      receiver: 接案者（Labor user_type=2）
    key_var: task_sn
  job:
    label: 工作系統
    note: 商家(employer user_type=1) 發佈工作，打工夥伴(labor user_type=2) 應徵。
    roles:
      employer: 商家（user_type=1）
      labor: 打工夥伴（user_type=2）
    key_var: job_sn
  activity:
    label: 營運活動（Activity API）
    note: |
      行銷/營運活動介面，走獨立的 Activity API base（/activity，非主 API 的 /v1）。
      端點以 /www/wwwroot/worky/documents/activity-api/ 為準。多為唯讀查詢（無 DB 副作用 / 無 push）。
      單元以 api: activity 標記，runner 改用 settings.activity_api_base 發請求。
    roles:
      labor: 打工夥伴（user_type=2）
    key_var: ""

# ----- 分解器可引用的 runtime 變數（runner 在每次跑 path 時注入 state.*） -----
# body / sql / expect 內以 {{...}} 引用；單一 {{x}} 會保留原型別（int/list 不被轉字串）。
runtime_vars:
  "state.run_id": 本次執行短碼（8 hex）
  "state.task_sn": 承攬制任務編號（T1 publish 後 save 進來）
  "state.job_sn": 工作編號（J1 publish 後 save 進來）
  "state.start_time": "承攬制任務開始 unix（now+900）"
  "state.end_time": "承攬制任務結束 unix（now+4600）"
  "state.job_start_date": 工作開始日 YYYYMMDD（int，未來 3~13 天輪播避免撞時段）
  "state.job_start_period": "工作開始時段 HH:00"
  "state.job_end_period": "工作結束時段 HH:00（+2h）"
  "state.job_work_minutes": 工時分鐘（固定 120）
  "<role>.user_id": actor 的 user_id（如 {{labor.user_id}}）
  "<role>.shop_id": actor 的 shop_id（如 {{employer.shop_id}}）
  "<role>.phone": actor 電話
  "<role>.user_type": actor user_type（1/2）

# ----- 推播 Type 全表（type 常量名 → 實際 type_id）-----
# 對齊 worky common/components/PushNotification/Type.php。
# 任務單元的 push.type 必須出現在這裡。
push_types:
  contract:
    CONTRACT_RECEIVER_APPLY_TASK: 20038          # Type::CONTRACT_RECEIVER_APPLY
    CONTRACT_RECEIVER_ACCEPT_INVITE: 20062       # Type::CONTRACT_PUBLISHER_INVITE_ACCEPTED
    CONTRACT_PUBLISHER_ACCEPT_APPLY: 20051       # Type::CONTRACT_RECEIVER_APPLY_ACCEPTED
    CONTRACT_PUBLISHER_DECLINE_APPLY: 20052      # Type::CONTRACT_RECEIVER_APPLY_REJECTED
    CONTRACT_PUBLISHER_CANCEL_HIRE: 20053        # Type::CONTRACT_RECEIVER_TASK_CANCELED（命名不對稱，程式如此）
    CONTRACT_RECEIVER_CANCEL_TASK: 20039         # Type::CONTRACT_RECEIVER_CANCEL_ACCEPTED（正常時段）
    CONTRACT_RECEIVER_CANCEL_TASK_LAST_MINUTE: 20046  # Type::CONTRACT_CANCEL_LAST_MINUTE
    CONTRACT_RECEIVER_START_TASK: 20048          # Type::CONTRACT_PUBLISHER_NOTIFY_TASK_START
    CONTRACT_RECEIVER_END_TASK: 20049            # Type::CONTRACT_PUBLISHER_NOTIFY_TASK_END
    CONTRACT_PUBLISHER_PASS_TASK: 20057          # Type::CONTRACT_RECEIVER_TASK_SUCCESS
    CONTRACT_PUBLISHER_REJECT_TASK: 20058        # Type::CONTRACT_RECEIVER_TASK_FAIL
  job:
    # === 商家收（10xxx）===
    FAVORITE_LABOR_ACCEPTED_TO_WORK: 10003       # 最愛夥伴同意上工
    JOB_PAYMENT_COMPLETED: 10004                 # 工作費用支付完成
    JOB_PAYMENT_FAILED: 10005                    # 工作費用支付失敗
    JOB_RECRUITMENT_ENDING_SOON: 10006           # 招募結束前 30 分
    LABOR_JOB_CANCELED: 10007                    # 打工夥伴取消工作（招募截止後）
    EMPLOYER_JOB_STARTING_SOON: 10008            # 工作開始前 30 分
    LABOR_CLOCK_IN: 10009                        # 打工夥伴上班打卡
    JOB_END: 10010                               # 工作結束
    LABOR_CLOCK_OUT: 10011                       # 打工夥伴下班打卡
    LABOR_JOB_APPLY: 10021                       # 打工夥伴申請上工（舊；僅自動錄取 work_mode=AUTO_ACCEPT 走）
    LABOR_JOB_APPLY_V2: 10025                     # 打工夥伴申請上工 V2（手動錄取走，現行路徑）
    LABOR_JOB_CANCELED_BEFORE_RECRUIT_DEADLINE: 10026  # 取消工作（招募截止前）
    # === 打工夥伴收（20xxx）===
    EMPLOYER_INVITED_TO_WORK: 20001              # 商家邀請工作
    LABOR_JOB_STARTING_SOON: 20002               # 工作開始前 1 小時
    JOB_CLOCK_IN_CODE: 20003                     # 商家發送上班打卡碼
    JOB_CLOCK_OUT_CODE: 20004                    # 商家發送下班打卡碼
    EMPLOYER_JOB_CANCELED: 20010                 # 商家取消工作
    EMPLOYER_ACCEPT_APPLY: 20016                 # 商家同意申請上工
    EMPLOYER_DECLINE_APPLY: 20017                # 商家婉拒申請上工
    EMPLOYER_CANCEL_HIRE_APPLY: 20019            # 商家取消錄取

# ----- 業務狀態 enum 速查（side_effects 的數值來源，回查主倉 model）-----
enums:
  # common/models/Labor/LaborMatchJob.php
  s_labor_match_jobs.status:
    STATUS_MATCHING: 1
    STATUS_LABOR_ACCEPT: 2
    STATUS_LABOR_DECLINE: 3
    STATUS_LABOR_APPLY: 4
    STATUS_LABOR_CANCEL_APPLICATION: 5
    STATUS_EMPLOYER_ACCEPT: 6
    STATUS_EMPLOYER_DECLINE: 7
    STATUS_EMPLOYER_CANCEL: 8
    STATUS_LABOR_CANCEL: 9
    STATUS_EMPLOYER_CANCEL_HIRE: 10
    STATUS_RECRUITMENT_END: 15
    STATUS_BACKUP: 16
  # common/models/Labor/LaborJob.php
  s_labor_jobs.status:
    STATUS_GO_TO_WORK: 1
    STATUS_EMPLOYER_CANCEL: 8
    STATUS_LABOR_CANCEL: 9
    STATUS_EMPLOYER_CANCEL_HIRE: 10
  # common/base/Enums/LaborJobStatus.php
  s_labor_jobs.job_status:
    STATUS_NONE: 0
    STATUS_WAITING_FOR_WORK: 1
    STATUS_WORKING: 2
    STATUS_WORK_FINISHED: 3
    STATUS_PAY_COMPLETED: 4
    STATUS_APPLYING: 8
    STATUS_CANCEL: 9

# =============================================================================
# 任務單元（最小可執行單位）
#   name           : 唯一 ID（contract=T*, job=J*；不可重複）
#   system         : contract | job
#   summary        : 一句話描述（分解器用來挑單元）
#   actor          : 觸發角色（須是該 system roles 之一）
#   method/endpoint: HTTP；endpoint 相對 /v1
#   doc_id         : worky documents/api 編號
#   event          : 觸發的 PHP Event FQCN（無則 ""）
#   request        : body 模板（runner 展開 {{...}}）
#   saves          : {var: json_path} 從 response.data 取值存進 state
#   push           : {to, type}（type 須在 push_types 內）；無推播則 null
#   preconditions  : 呼叫前必須成立的狀態（人讀 + 分解器排序依據）
#   side_effects   : 成功後的 DB 變化；verify 用 {table, key, become:{col:val}}
#                    become 的值可用 {{enum.xxx}} 或直接數字
# =============================================================================
# =============================================================================
# query_units — 驗證用查詢端點（expect.api 用；與 task_units 分開，不進分解器菜單）
# -----------------------------------------------------------------------------
# 用例的「預期」改打對應查詢接口比對回應，而非 SELECT DB（驗對外行為，含序列化/權限/快取）。
# 每個 query_unit：actor / method(GET) / endpoint / request(查詢參數，可用 {{state.*}})。
# expect.api: {query: <名>, actor?: <覆寫呼叫者>, args?: {覆寫/補參數}, equals: {回應欄位路徑: 期望}}
#   - 欄位路徑相對 response.data（worky 統一 {success,code,data}），支援點號/陣列索引下鑽。
# =============================================================================
query_units:
  Q_employer_job_info:
    system: job
    summary: 商家查工作詳情（驗證工作狀態用）
    actor: employer
    method: GET
    endpoint: /employer/shop/job/info
    doc_id: 110-1
    request:
      job_sn: '{{state.job_sn}}'
    note: |
      查得到該 job(success=true) 即證明已發佈（未發佈會回 INVALID_JOB_SN）。
      info 不對外暴露 status 欄，驗「媒合中」改用等價暴露欄位 recruited_count（剛發佈=0）。
      可比對欄位：recruited_count / recruit_count / start_at / hourly_wage / work_minutes 等。
  Q_employer_schedule_info:
    system: job
    summary: 商家查日程內頁（驗工作進行狀態；labors[] 帶各夥伴打卡碼與打卡時間）
    actor: employer
    method: GET
    endpoint: /employer/shop/schedule/info
    doc_id: 115-2
    request:
      job_sn: '{{state.job_sn}}'
    note: |
      唯一能拿到每位夥伴打卡碼的查詢端點：labors[]（僅 status=1 上工者）每筆含
      labor_id / start_code / end_code / actual_clock_in_at / actual_clock_out_at /
      adjusted_clock_in_at / adjusted_clock_out_at；J3 錄取後立即可查（無時間門檻）。
      頂層 working_status（0:未開始 1:進行中 2:已結束）依 now 對 start_at/end_at 即時推算，
      可當 wait_api 條件等「工作開始」（J6 下班卡要求 start_at<=now，否則 40403）。
      用法：J3 後 assert_api + save 把打卡碼存進 state——
        {assert_api: {query: Q_employer_schedule_info,
                      save: {start_code: labors.0.start_code, end_code: labors.0.end_code}}}
  Q_publisher_task_info:
    system: contract
    summary: 發案者查單一任務明細（驗證承攬任務對外狀態用）
    actor: publisher
    method: GET
    endpoint: /contract/task/info
    doc_id: 405-2
    request:
      task_sn: '{{state.task_sn}}'
    note: |
      回應 data.publisher_task_status.code 為發案者端對外任務狀態（PublisherTaskStatus）：
      1=媒合中(MATCHING)、7=任務完成…（對應 DB s_contract_tasks.status 經正規化）。
  Q_labor_job_matches:
    system: job
    summary: 打工夥伴查自己的工作媒合清單（驗證申請/錄取狀態用）
    actor: labor
    method: GET
    endpoint: /labor/job-match/list
    doc_id: '108'
    request:
      type: 3                       # TYPE_FILTER_JOB：夥伴主動申請特定工作的媒合
    note: |
      回應 data.matching[] 為進行中的媒合，每筆含 job_sn + status（LaborMatchJob 狀態，與 DB 同值）：
      4=打工夥伴申請(STATUS_LABOR_APPLY)、6=商家錄取(STATUS_EMPLOYER_ACCEPT)、16=備取(STATUS_BACKUP)…
      用 expect.api / assert_api 的 find:{in: matching, where:{job_sn: ...}} 取單筆再驗 status。
  Q_employer_evaluation_get:
    system: job
    summary: 商家查「自己對某夥伴在某工作」的評價（驗互評是否寫入用）
    actor: employer
    method: GET
    endpoint: /employer/evaluation/get
    doc_id: 126-2
    request:
      labor_id: '{{labor.user_id}}'
      job_sn: '{{state.job_sn}}'
    note: |
      未評價時回應僅有 schedule_type；已評價才帶 labor_id/job_sn/professional_stars/
      attitude_stars/cleanliness_stars/content/created_at（星等為 1~5 綜合換算，非輸入的 1~4）。
      故驗「評價已寫入」用 equals:{job_sn: ...}（有此欄即代表評價存在），不比對星數。
  Q_labor_evaluation_get:
    system: job
    summary: 打工夥伴查「自己對某工作」的評價（驗互評是否寫入用）
    actor: labor
    method: GET
    endpoint: /labor/evaluation/get
    doc_id: 219-2
    request:
      job_sn: '{{state.job_sn}}'
    note: |
      未評價時回應僅有 schedule_type；已評價才帶 job_sn/atmosphere_stars/environment_stars/
      communication_stars/rating_stars/content/created_at。驗「已寫入」用 equals:{job_sn: ...}。
  # ── 推播通知查詢（驗推播改打 API，不再 SELECT s_notifications）──────────────
  # runner 的 push 驗證依「收件 actor 的 user_type」自動挑下面對應端點：1→employer、2→labor
  # （publisher/receiver 皆 user_type=2，走 labor 端點）。回應每筆含 id/type_id/title/content/created_at，
  # runner 取「行動前水位(max id)之後新出現、且 type_id 相符」的通知比對 title/content。
  Q_labor_notifications:
    system: job
    summary: 打工夥伴查歷史通知（驗推播用；publisher/receiver 同走此端點）
    actor: labor
    method: GET
    endpoint: /labor/notification/list
    doc_id: '251'
    request:
      page: 1                         # 第 1 頁即最新；每頁 20 筆、僅 30 天內
    note: |
      回應 data.list[] 每筆含 id / type_id / title / content / created_at / read。
      runner._assert_push_api 以此取代 s_notifications SELECT（不查 DB）。
  Q_employer_notifications:
    system: job
    summary: 商家查歷史通知（驗推播用）
    actor: employer
    method: GET
    endpoint: /employer/notification/list
    doc_id: '151'
    request:
      page: 1
    note: |
      回應 data 為通知陣列（或 {list:[...]}）；每筆含 id / type_id / title / content / created_at。

task_units:

  # ===========================================================================
  # 承攬制 contract（T1–T8b）
  # ===========================================================================
  T1_publisher_publish_task:
    system: contract
    summary: 發案者發佈一筆任務（FunPoint 信用卡）
    actor: publisher
    method: POST
    endpoint: /contract/task/publish
    doc_id: "402"
    event: ""
    request:
      name: "regression {{state.run_id}}"
      task_type_level1: 1
      city_id: 19
      district_id: 194
      description: regression auto-task
      start_time: "{{state.start_time}}"
      end_time: "{{state.end_time}}"
      recruit_count: 1
      task_amount: 300
      # 3=FUN_POINT_VIRTUAL_ATM。v31x DB 已無 publisher 236 的 FunPoint 綁卡
      # （信用卡=1 會被擋 20023 需先綁卡），ATM 發佈只查金額上限不需綁卡；
      # happy path 一律用 db_exec 把 pay_status 改 102，故 ATM 的「T6 等付款」不再卡關。
      payment_method_id: 3
      contact_name: regression
      contact_phone: "0912345678"
      show_to_taker: 0
      photos: []
      match_target_favor: 0
    saves:
      task_sn: task_sn
    push: null
    preconditions: []
    side_effects:
      - table: s_contract_tasks
        key: "task_sn='{{state.task_sn}}'"
        note: 建立任務（媒合中）

  T2_receiver_apply:
    system: contract
    summary: 接案者申請任務
    actor: receiver
    method: POST
    endpoint: /contract/receiver-match-task/task-apply
    doc_id: 502-1
    event: common\components\Contract\Event\AfterReceiverApplyTaskEvent
    request: {task_sn: "{{state.task_sn}}"}
    push: {to: publisher, type: CONTRACT_RECEIVER_APPLY_TASK}
    preconditions: [任務存在且媒合中]
    side_effects: []

  T3_receiver_accept_invite:
    system: contract
    summary: 接案者接受發案者邀請
    actor: receiver
    method: POST
    endpoint: /contract/receiver-match-task/task-accept
    doc_id: 502-4
    event: common\components\Contract\Event\AfterAcceptPublisherInviteEvent
    request: {task_sn: "{{state.task_sn}}"}
    push: {to: publisher, type: CONTRACT_RECEIVER_ACCEPT_INVITE}
    preconditions: [發案者已邀請該接案者]
    side_effects: []

  T3a_publisher_accept_apply:
    system: contract
    summary: 發案者同意接案者申請（錄取）
    actor: publisher
    method: POST
    endpoint: /contract/task-match/accept
    doc_id: 407-1
    event: common\components\Contract\Event\AfterAcceptReceiverApplyEvent
    request: {task_sn: "{{state.task_sn}}", receiver_id: "{{receiver.user_id}}"}
    push: {to: receiver, type: CONTRACT_PUBLISHER_ACCEPT_APPLY}
    preconditions: [接案者已申請（T2）]
    side_effects: []

  T3b_publisher_decline_apply:
    system: contract
    summary: 發案者婉拒接案者申請
    actor: publisher
    method: POST
    endpoint: /contract/task-match/decline
    doc_id: 407-2
    event: common\components\Contract\Event\AfterDeclineReceiverApplyEvent
    request: {task_sn: "{{state.task_sn}}", receiver_id: "{{receiver.user_id}}"}
    push: {to: receiver, type: CONTRACT_PUBLISHER_DECLINE_APPLY}
    preconditions: [接案者已申請（T2）]
    side_effects: []

  T4_publisher_cancel_hire:
    system: contract
    summary: 發案者取消錄取
    actor: publisher
    method: POST
    endpoint: /contract/task-match/cancel-hire
    doc_id: 407-4
    event: common\components\Contract\Event\AfterCancelHireReceiverApplyEvent
    request: {task_sn: "{{state.task_sn}}", receiver_id: "{{receiver.user_id}}"}
    push: {to: receiver, type: CONTRACT_PUBLISHER_CANCEL_HIRE}
    preconditions: [已錄取接案者（T3a）]
    side_effects: []

  T5_receiver_cancel_task:
    system: contract
    summary: 接案者取消任務
    actor: receiver
    method: POST
    endpoint: /contract/receiver-task/task-cancel
    doc_id: "505"
    event: common\components\Contract\Event\AfterReceiverCancelTaskEvent
    request: {task_sn: "{{state.task_sn}}", canceled_reason_id: 1}
    push: {to: publisher, type: CONTRACT_RECEIVER_CANCEL_TASK}
    preconditions: [接案者已被錄取且任務尚未開始]
    side_effects: []
    notes: handler 依時段切換 push type；last-minute 改 CONTRACT_RECEIVER_CANCEL_TASK_LAST_MINUTE(20046)。

  T6_receiver_start_task:
    system: contract
    summary: 接案者開始任務
    actor: receiver
    method: POST
    endpoint: /contract/receiver-task/task-start
    doc_id: 506-1
    event: common\components\Contract\Event\AfterReceiverStartTaskEvent
    request: {task_sn: "{{state.task_sn}}"}
    push: {to: publisher, type: CONTRACT_RECEIVER_START_TASK}
    preconditions: [任務已付款（pay_status=102）且已到開始時間]
    side_effects: []

  T7_receiver_end_task:
    system: contract
    summary: 接案者結束任務
    actor: receiver
    method: POST
    endpoint: /contract/receiver-task/task-end
    doc_id: 506-2
    event: common\components\Contract\Event\AfterReceiverEndTaskEvent
    request: {task_sn: "{{state.task_sn}}"}
    push: {to: publisher, type: CONTRACT_RECEIVER_END_TASK}
    preconditions: [任務執行中（T6 後）]
    side_effects: []

  T8_publisher_pass_task:
    system: contract
    summary: 發案者通過任務完成
    actor: publisher
    method: POST
    endpoint: /contract/publisher/pass-receiver-task
    doc_id: 408-2
    event: common\components\Contract\Event\AfterPassReceiverTaskEvent
    request: {task_sn: "{{state.task_sn}}", receiver_id: "{{receiver.user_id}}"}
    push: {to: receiver, type: CONTRACT_PUBLISHER_PASS_TASK}
    preconditions: [接案者已回報結束（T7）]
    side_effects: []

  T8b_publisher_reject_task:
    system: contract
    summary: 發案者駁回任務完成
    actor: publisher
    method: POST
    endpoint: /contract/publisher/reject-receiver-task
    doc_id: 408-3
    event: common\components\Contract\Event\AfterRejectReceiverTaskEvent
    request: {task_sn: "{{state.task_sn}}", receiver_id: "{{receiver.user_id}}"}
    push: {to: receiver, type: CONTRACT_PUBLISHER_REJECT_TASK}
    preconditions: [接案者已回報結束（T7）]
    side_effects: []

  # ===========================================================================
  # 工作系統 job（J1–J7）— enum 已對源碼確認（next-v31x）
  #
  # guards / branches 結構（給分解器依 coverage level 產用例；對齊 worky form rule）：
  #   guards   ── 前置守衛：happy path 必須滿足，轉成 setup，不獨立成用例。
  #     - need:    人類可讀條件
  #       satisfy: 擇一 ── caps:[..]（帳號池配具該能力帳號）
  #                       ｜ by: <transition>（由前序步驟建立狀態）
  #                       ｜ skip: "<原因>"（時間鎖/無 API 可替代；產生器據此把整支用例標 skip）
  #   branches ── 業務分支：L1 各生一條「負向子用例」（預期 API 失敗）。
  #     - when:        觸發條件
  #       expect_fail: {code: <int>} 或 {message_contains: "<片語>"}
  #       arrange:     擇一 ── caps_lacking:[..]（配缺該能力的帳號）
  #                          ｜ by:[<transition>..]（跑前序步驟造出該前提）
  #                          ｜ note: "<需特殊安排的說明>"
  # 錯誤碼來源：/www/wwwroot/worky/api/base/Exception/ApiExceptionCode.php
  # ===========================================================================
  J1_employer_publish_job:
    system: job
    summary: 商家發佈工作
    actor: employer
    method: POST
    endpoint: /employer/shop/job/publish
    doc_id: 109-1
    event: ""
    request:
      shop_id: "{{employer.shop_id}}"
      job_sn: ""
      job_type_level1: 23
      job_type_level2: 24
      job_type_level3: 25
      start_date_list: ["{{state.job_start_date}}"]
      start_time_period: "{{state.job_start_period}}"
      end_time_period: "{{state.job_end_period}}"
      work_minutes: "{{state.job_work_minutes}}"   # 必須 == (end-start)-rest，否則 20030
      rest_minutes: 0
      recruit_count: "{{state.job_recruit_count}}"  # 預設 1；多人錄取用例在 spec vars 覆寫
      match_target_favor: 0
      hourly_wage: 250                              # 不可低於 230（20011）
      city_id: 19
      district_id: 193
      address: "回歸測試地址 {{state.run_id}}"
      labor_insurance_deduction_type: 1
      cover_photo: ""
      photos: []
      description: "regression job {{state.run_id}}"
      remarks: ""
      workflow: ""
      teaching: ""
      emergency_contact_phone: ""
      contact_time: ""
      payment_method_id: 1                          # 信用卡（dev 不真扣款）
      custom_name: 回歸測試工作
      confirm_item: []
      skill_tags: []
      benefit_tags: []
    saves:
      job_sn: job_sn_list.0
    push: null
    # expect 的狀態驗證走查詢端點（產生器自動帶進 expect.api）；info 不暴露 status，
    # 查得到該 job 即已發佈，且剛發佈 recruited_count=0（媒合中、尚無人錄取）。
    verify_api:
      query: Q_employer_job_info
      equals: {recruited_count: 0}
    guards:
      - need: 商家已登入且店鋪已通過審核（validation_status=3；只送審未過審發佈會 20022）
        satisfy: {caps: [active, shop_approved]}
      - need: 時薪、工時、招募人數等發佈參數合法
        satisfy: {note: "happy 用 request 預設值；非法值見 branches"}
    branches:
      - when: 店鋪未通過審核（含公司型已送審未過審）
        expect_fail: {code: 20022}                  # SHOP_VALIDATION_NOT_PASS
        arrange: {note: "employer 用「有 verified_shop 但無 shop_approved」的帳號"}
      - when: 時薪低於下限（230）
        expect_fail: {code: 20011}                  # HOURLY_WAGE_TOO_LOW
        arrange: {note: "request.hourly_wage 設 < 230"}
      - when: 時薪高於上限
        expect_fail: {code: 20012}                  # HOURLY_WAGE_TOO_HIGH
        arrange: {note: "request.hourly_wage 設超過上限"}
      - when: work_minutes != (end-start)-rest
        expect_fail: {code: 20030}                  # JOB_WORK_HOURS_NOT_IDENTICAL
        arrange: {note: "request.work_minutes 與時段不符"}
      - when: 工時低於最短限制
        expect_fail: {code: 20040}                  # JOB_MIN_WORK_MINUTES
        arrange: {note: "時段差距小於最短工時"}
      - when: 店鋪不存在 / 非本商家
        expect_fail: {code: 30205}                  # SHOP_NOT_FOUND
        arrange: {note: "request.shop_id 給不存在或他人店鋪"}
    side_effects:
      - table: s_jobs
        key: "job_sn='{{state.job_sn}}'"
        become: {status: 1}                         # JobStatus 媒合中
        note: 建立工作

  J2_labor_apply:
    system: job
    summary: 打工夥伴申請上工
    actor: labor
    method: POST
    endpoint: /labor/job-match/job-apply
    doc_id: 210-1
    event: common\components\Event\Events\LaborJobApplyFinishedEvent
    # is_not_validate_time_interval=true：跳過「兩工作間隔過近」軟提醒（30303，APP 是彈確認框
    # 後帶此旗標重送；框架等同「使用者已確認」）。負向用例要驗 30303 時用 args 覆寫成 false。
    request: {job_sn: "{{state.job_sn}}", is_not_validate_time_interval: true}
    push: {to: employer, type: LABOR_JOB_APPLY_V2}   # 手動錄取路徑送 V2(10025)；舊 10021 僅 AUTO_ACCEPT
    # 申請後該夥伴媒合清單 matching[] 該 job 的 status=4（STATUS_LABOR_APPLY）；
    # query actor=labor 會解析到該步 bind 的夥伴（labor1/labor2 各驗各的）。
    verify_api:
      query: Q_labor_job_matches
      find: {in: matching, where: {job_sn: "{{state.job_sn}}"}}
      equals: {status: 4}
    # 對齊 worky JobMatchForm::validateCanApplyJob / validateRecruitJob（labor 端）
    guards:
      - need: 工作存在且在媒合中、招募未滿、未過截止
        satisfy: {by: J1_employer_publish_job}
      - need: 夥伴已實名認證且 profile 完整、未停權
        satisfy: {caps: [verified, profile_complete, active]}
      - need: 夥伴該時段無已確認工作（s_labor_jobs status=1, end_at>now）
        satisfy: {note: "靠帳號池 LRU 輪換 + runner 未來時段輪轉避開（#4 不再用 db_exec 清殘留）"}
    branches:
      - when: 夥伴尚未填寫個人資訊（id_number 空）
        expect_fail: {code: 30211}                  # LABOR_PROFILE_NOT_FILLED
        arrange: {note: "需 id_number 空的帳號；測試池帳號皆已實名，無法重現"}
      - when: 夥伴 profile 未完成
        expect_fail: {code: 30215}                  # LABOR_PROFILE_INCOMPLETE
        arrange: {caps_lacking: [profile_complete]}
      - when: 夥伴身分審核中
        expect_fail: {code: 30216}                  # LABOR_PROFILE_VALIDATING
        arrange: {caps_lacking: [verified]}         # 池中 labor_lacking_verified=276(valid_status=2 待認證)
      - when: 夥伴認證未通過
        expect_fail: {code: 30217}                  # LABOR_PROFILE_VALIDATE_FAIL
        arrange: {note: "配 valid_status=3(認證失敗) 的帳號"}
      - when: 夥伴帳號停權中
        expect_fail: {code: 30208}                  # LABOR_IS_SUSPENDED
        arrange: {caps_lacking: [active]}
      - when: 夥伴該時段已有確認工作
        expect_fail: {code: 30207}                  # ALREADY_HAVE_A_JOB
        arrange: {note: "略過 no_time_conflict 守衛，留下重疊的 s_labor_jobs"}
      - when: 同一商家/企業當日已有工作
        expect_fail: {code: 30229}                  # LABOR_THAT_DAY_MATCH_JOB_SUCCESS_ONLINE（同店為 30213）
        arrange: {note: "同店同日先錄取一份再申請另一份"}
      - when: 夥伴在該店黑名單
        expect_fail: {code: 30301}                  # LABOR_DENIED_DUE_TO_BLOCKLIST
        arrange: {note: "需商家把該夥伴加入黑名單"}
      - when: 重複申請（已申請過）
        expect_fail: {message_contains: "已在申請中"}
        arrange: {by: [J2_labor_apply]}
      - when: 招募人數已滿
        expect_fail: {message_contains: "招募人數已滿"}
        arrange: {note: "recruit_count=1 且已錄取額滿後再申請"}
      - when: 已過招募截止
        expect_fail: {message_contains: "招募已截止"}
        arrange: {skip: "招募截止由後端依 start_time 推算且恆在未來，無 API 可拉到過去，負向情境無法重現"}
    side_effects:
      - table: s_labor_match_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 4}                         # STATUS_LABOR_APPLY

  J2b_labor_cancel_apply:
    system: job
    summary: 打工夥伴取消申請
    actor: labor
    method: POST
    endpoint: /labor/job-match/job-cancel-application
    doc_id: 210-2
    event: ""
    request: {job_sn: "{{state.job_sn}}"}
    push: null
    guards:
      - need: 夥伴已申請（J2，status=4）或備取中（16）
        satisfy: {by: J2_labor_apply}
    branches:
      - when: 招募已截止後才取消
        expect_fail: {message_contains: "招募已截止"}
        arrange: {skip: "招募截止由後端依 start_time 推算且恆在未來，無 API 可拉到過去，負向情境無法重現"}
    side_effects:
      - table: s_labor_match_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 5}                         # STATUS_LABOR_CANCEL_APPLICATION

  J3_employer_accept:
    system: job
    summary: 商家同意上工（錄取）
    actor: employer
    method: POST
    endpoint: /employer/shop/job-match/accept
    doc_id: 120-1
    event: common\components\Event\Events\AfterEmployerJobMatchAcceptEvent
    # is_not_validate_time_interval=true：跳過商家端「夥伴兩工作間隔過近」確認提醒
    # （20325，SCENARIO_JOB_ACCEPT 同收此旗標；等同使用者在確認框按「仍要同意」）。
    request: {job_sn: "{{state.job_sn}}", labor_id: "{{labor.user_id}}", is_not_validate_time_interval: true}
    push: {to: labor, type: EMPLOYER_ACCEPT_APPLY}
    # 錄取後被錄取夥伴媒合清單該 job 的 status=6（STATUS_EMPLOYER_ACCEPT）；
    # 以 bind 指定被錄取的夥伴（query actor=labor 解析到該夥伴）。
    verify_api:
      query: Q_labor_job_matches
      find: {in: matching, where: {job_sn: "{{state.job_sn}}"}}
      equals: {status: 6}
    # 對齊 worky employer/shop/JobMatchForm::validateJobAccept
    guards:
      - need: 該夥伴已申請（s_labor_match_jobs.status=4）且未取消/未被婉拒
        satisfy: {by: J2_labor_apply}
      - need: 工作仍在招募中、未額滿、未過招募時間
        satisfy: {by: J1_employer_publish_job}
      - need: 被錄取夥伴當日在該店無其他已確認工作
        satisfy: {caps: [clean], note: "happy 用乾淨帳號；衝突見 branches"}
    branches:
      - when: 招募人數已滿（工作已 STOP_RECRUIT）
        expect_fail: {code: 20306}                  # ACCEPT_AUDIT_RECRUIT_MAX
        arrange: {note: "recruit_count=1，先錄取一位額滿，再錄取第二位"}
      - when: 招募時間已結束
        expect_fail: {code: 20307}                  # ACCEPT_AUDIT_RECRUIT_TIME_EXPIRED
        arrange: {skip: "招募截止由後端依 start_time 推算且恆在未來，無 API 可拉到過去，負向情境無法重現"}
      - when: 該夥伴已取消申請
        expect_fail: {code: 20305}                  # ACCEPT_AUDIT_STATUS_LABOR_CANCEL_APPLICATION
        arrange: {by: [J2b_labor_cancel_apply]}
      - when: 該夥伴已被錄取（重複錄取）
        expect_fail: {code: 20310}                  # ACCEPT_AUDIT_STATUS_EMPLOYER_ACCEPT
        arrange: {by: [J3_employer_accept]}
      - when: 該夥伴已被婉拒
        expect_fail: {code: 20311}                  # ACCEPT_AUDIT_STATUS_EMPLOYER_DECLINE
        arrange: {by: [J3b_employer_decline]}
      - when: 被錄取夥伴當日在該店已有工作
        expect_fail: {code: 30213}                  # LABOR_HAS_JOB_ON_THE_SAME_DAY_AT_THE_SHOP
        arrange: {note: "同店同日先讓該夥伴錄取另一份"}
      - when: 工作已取消
        expect_fail: {code: 10201}                  # CANCELLED_JOB_STATUS
        arrange: {note: "工作被取消後再錄取"}
    side_effects:
      - table: s_labor_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 1, job_status: 1}          # 上工 / 待上工（建立 s_labor_jobs）
        note: 招募額滿時 s_jobs.status→15（招募結束）

  J3b_employer_decline:
    system: job
    summary: 商家婉拒上工
    actor: employer
    method: POST
    endpoint: /employer/shop/job-match/decline
    doc_id: 120-2
    event: ""
    request: {job_sn: "{{state.job_sn}}", labor_id: "{{labor.user_id}}"}
    push: {to: labor, type: EMPLOYER_DECLINE_APPLY}
    guards:
      - need: 夥伴已申請（J2，status=4）或備取（16）
        satisfy: {by: J2_labor_apply}
    branches:
      - when: 該夥伴已被婉拒（重複婉拒）
        expect_fail: {code: 20311}                  # ACCEPT_AUDIT_STATUS_EMPLOYER_DECLINE
        arrange: {by: [J3b_employer_decline]}
      - when: 該夥伴已取消申請
        expect_fail: {code: 20309}                  # ACCEPT_AUDIT_STATUS_LABOR_CANCEL
        arrange: {by: [J2b_labor_cancel_apply]}
    side_effects:
      - table: s_labor_match_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 7}                         # STATUS_EMPLOYER_DECLINE

  J4_employer_cancel_hire:
    system: job
    summary: 商家取消錄取
    actor: employer
    method: POST
    endpoint: /employer/shop/job-match/cancel-hire
    doc_id: 120-3
    event: ""
    request: {job_sn: "{{state.job_sn}}", labor_id: "{{labor.user_id}}", canceled_reason_id: 1}
    push: {to: labor, type: EMPLOYER_CANCEL_HIRE_APPLY}
    guards:
      - need: 夥伴已被錄取（J3，s_labor_jobs.status=1 上工）
        satisfy: {by: J3_employer_accept}
    branches:
      - when: 未錄取就取消錄取（夥伴僅申請中，無 s_labor_jobs）
        expect_fail: {message_contains: "尚未"}
        arrange: {by: [J2_labor_apply], note: "跳過 J3，直接取消錄取"}
    side_effects:
      - table: s_labor_match_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 10}                        # STATUS_EMPLOYER_CANCEL_HIRE
      - table: s_labor_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 10}                        # STATUS_EMPLOYER_CANCEL_HIRE；s_jobs.recruited_count-1

  J5_labor_clock_in:
    system: job
    summary: 打工夥伴上班打卡
    actor: labor
    method: POST
    endpoint: /labor/job/clock-in
    doc_id: "213"
    event: ""
    request: {job_sn: "{{state.job_sn}}", code: "{{state.start_code}}"}
    push: {to: employer, type: LABOR_CLOCK_IN}
    guards:
      - need: 已錄取且待上工（J3，job_status=1、actual_clock_in_at 空）
        satisfy: {by: J3_employer_accept}
      - need: 已知正確上班打卡碼 start_code
        # 打卡碼由商家日程內頁（115-2）labors[] 回傳，J3 錄取後立即可查。
        satisfy: {note: "J3 後 assert_api Q_employer_schedule_info + save 把 labors[].start_code/end_code 存進 state"}
      - need: 現在未超過可打卡時限（end_at + schedule.24_hours_after_work_end 之內；dev=600s）
        # clock-in 沒有「太早」的下限——開工前即可打（adjusted_clock_in_at 會貼齊 start_at）。
        # dev min_publish_interval_seconds=600：用 vars job_start_after_minutes≈13 發近時段工作即可。
        satisfy: {note: "vars: {job_start_after_minutes: 13} 發 13 分鐘後開始的工作；發佈後立刻申請/錄取/打卡"}
    branches:
      - when: 打卡碼錯誤
        expect_fail: {message_contains: "打卡碼"}
        arrange: {note: "request.code 給錯誤碼"}
    side_effects:
      - table: s_labor_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {job_status: 2}                     # STATUS_WORKING；寫 actual_clock_in_at

  J6_labor_clock_out:
    system: job
    summary: 打工夥伴下班打卡
    actor: labor
    method: POST
    endpoint: /labor/job/clock-out
    doc_id: "214"
    event: ""
    request: {job_sn: "{{state.job_sn}}", code: "{{state.end_code}}"}
    push: {to: employer, type: LABOR_CLOCK_OUT}
    guards:
      - need: 已上班打卡（J5，job_status=2、actual_clock_out_at 空）
        satisfy: {by: J5_labor_clock_in}
      - need: 已知正確下班打卡碼 end_code
        satisfy: {note: "同 J5：assert_api Q_employer_schedule_info + save（一次存齊 start_code/end_code）"}
      - need: 工作已開始（start_at<=now，否則 40403 WRONG_TIME_TO_CLOCK_OUT）
        # 下班卡與上班卡不同——有「太早」下限：須等到 start_at 過後。
        satisfy: {note: "J6 前 wait_api Q_employer_schedule_info equals {working_status: 1}（timeout 依 job_start_after_minutes 抓 ~900s）"}
    branches:
      - when: 打卡碼錯誤
        expect_fail: {message_contains: "打卡碼"}
        arrange: {note: "request.code 給錯誤碼"}
    side_effects:
      - table: s_labor_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {job_status: 3}                     # STATUS_WORK_FINISHED；寫 actual_clock_out_at

  J7_labor_cancel_job:
    system: job
    summary: 打工夥伴取消工作
    actor: labor
    method: POST
    endpoint: /labor/job/cancel
    doc_id: "209"
    event: ""
    request: {job_sn: "{{state.job_sn}}", canceled_reason_id: 1}
    push: {to: employer, type: LABOR_JOB_CANCELED}
    guards:
      - need: 已錄取（J3，s_labor_jobs.status=1 上工）
        satisfy: {by: J3_employer_accept}
      - need: 現在早於 s_jobs.start_at（工作開始前才可取消）
        satisfy: {note: "happy 用發佈時的未來時段；start_at 未到"}
    branches:
      - when: 工作已開始後才取消
        expect_fail: {message_contains: "已開始"}
        arrange: {skip: "需把工作時間改到過去模擬「已開始」，禁 db_exec(#4) 後無 API 可替代"}
    side_effects:
      - table: s_labor_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 9}                         # STATUS_LABOR_CANCEL
      - table: s_labor_match_jobs
        key: "job_id=(SELECT id FROM s_jobs WHERE job_sn='{{state.job_sn}}') AND labor_id={{labor.user_id}}"
        become: {status: 9}                         # STATUS_LABOR_CANCEL；s_jobs.recruited_count-1
    notes: 招募截止前的 push 改 LABOR_JOB_CANCELED_BEFORE_RECRUIT_DEADLINE(10026)。

  J8_employer_evaluate_labor:
    system: job
    summary: 商家對打工夥伴 5 星好評
    actor: employer
    method: POST
    endpoint: /employer/evaluation/evaluate
    doc_id: 126-1
    event: ""
    # 三個維度星等範圍 1~4（worky EvaluationForm rules），5 星好評＝三維皆給滿分 4。
    # evaluation_labels 必填且不可為空陣列（form validateEvaluationLabels），最多 3 個；
    # 商家評夥伴用「描述夥伴」的標籤組（s_option_evaluation_labels.user_type=2 正面 impact_type=1）：
    #   2=態度積極 7=準時上班 9=願意再次雇用。
    request:
      labor_id: "{{labor.user_id}}"
      job_sn: "{{state.job_sn}}"
      like_labor_stars: 4
      cooperate_again_stars: 4
      meet_expectation_stars: 4
      evaluation_labels: [2, 7, 9]
      content: "回歸測試 5 星好評 {{state.run_id}}"
    # 評價成功僅丟 RabbitMQ（Producer::EMPLOYER_EVALUATE）做後續活動獎勵，
    # 不在請求當下對夥伴發即時推播，故 happy path 不驗 push。
    push: null
    # 驗評價已寫入：改打 126-2 查回應帶 job_sn（未評價只回 schedule_type）。
    verify_api:
      query: Q_employer_evaluation_get
      equals: {job_sn: "{{state.job_sn}}"}
    guards:
      - need: 該夥伴此工作已完成（J6 下班打卡後 s_labor_jobs.job_status=3 STATUS_WORK_FINISHED）
        satisfy: {by: J6_labor_clock_out}
      - need: 未超過評價時限（end_at + 72h 內；dev 預設 72 小時，剛下班必在期限內）
        satisfy: {note: "緊接 J6 後評價即可"}
    branches:
      - when: 工作尚未完成（夥伴未下班打卡）
        expect_fail: {message_contains: "完成"}
        arrange: {note: "略過 J5/J6，工作未到 STATUS_WORK_FINISHED 即評價"}
      - when: 重複評價（同單已評過）
        expect_fail: {message_contains: "重複"}        # EVALUATION_IS_REPETITIVE
        arrange: {by: [J8_employer_evaluate_labor]}
      - when: evaluation_labels 為空 / 超過 3 個
        expect_fail: {message_contains: "標籤"}
        arrange: {note: "request.evaluation_labels 給 [] 或 4 個以上"}
    side_effects:
      - table: s_employer_evaluations
        key: "job_sn='{{state.job_sn}}' AND labor_id={{labor.user_id}}"
        note: 寫入商家對夥伴的評價（表名以主倉 Employer\\Evaluation 模型為準）

  J9_labor_evaluate_employer:
    system: job
    summary: 打工夥伴對商家 5 星好評
    actor: labor
    method: POST
    endpoint: /labor/evaluation/evaluate
    doc_id: 219-1
    event: ""
    # 星等範圍同上 1~4，5 星好評＝三維皆 4。evaluation_labels 必填非空、最多 3 個；
    # 夥伴評商家用「描述工作/商家」的標籤組（user_type=1 正面 impact_type=1）：
    #   19=溝通順暢 22=準時上班 26=願意再次工作。
    request:
      job_sn: "{{state.job_sn}}"
      cooperate_again_stars: 4
      meet_expectation_stars: 4
      recommend_employer_stars: 4
      evaluation_labels: [19, 22, 26]
      content: "回歸測試 5 星好評 {{state.run_id}}"
    push: null
    verify_api:
      query: Q_labor_evaluation_get
      equals: {job_sn: "{{state.job_sn}}"}
    guards:
      - need: 此工作已完成（J6 下班打卡後 job_status=3 STATUS_WORK_FINISHED）
        satisfy: {by: J6_labor_clock_out}
      - need: 未超過評價時限（end_at + 72h 內）
        satisfy: {note: "緊接 J6 後評價即可"}
    branches:
      - when: 工作尚未完成
        expect_fail: {message_contains: "完成"}
        arrange: {note: "略過 J5/J6 即評價"}
      - when: 重複評價（同單已評過）
        expect_fail: {message_contains: "重複"}        # EVALUATION_IS_REPETITIVE
        arrange: {by: [J9_labor_evaluate_employer]}
      - when: evaluation_labels 為空 / 超過 3 個
        expect_fail: {message_contains: "標籤"}
        arrange: {note: "request.evaluation_labels 給 [] 或 4 個以上"}
    side_effects:
      - table: s_labor_evaluations
        key: "job_sn='{{state.job_sn}}'"
        note: 寫入夥伴對商家的評價（表名以主倉 Shop\\Evaluation 模型為準）

  # ===== 營運活動：點石成金爭奪戰（Activity API，唯讀查詢）=====
  A1_labor_ranking_init:
    system: activity
    summary: 點石成金爭奪戰 — 取得排行榜初始化資訊（當前活動 + top100 + 特別獎）
    actor: labor
    api: activity                                   # 走 /activity base（非 /v1）
    method: GET
    endpoint: /labor/ranking-list/init-data
    doc_id: 2103-1
    event: ""
    # alias 選填，不傳即查「當前正在進行的活動」（happy path 用此）
    request: {}
    push: null
    guards:
      - need: 打工夥伴已登入（labor token）
        satisfy: {caps: [active]}
      - need: 有正在進行中的活動（無活動時 data 為 null，仍 success）
        satisfy: {note: "happy 僅驗 API 成功；活動內容依環境而定"}
    side_effects: []                                # 唯讀，無 DB 變更
    notes: 回傳 activity / top_ranking_list / special_prize_list / other_activities。

  A2_labor_ranking_search:
    system: activity
    summary: 點石成金爭奪戰 — 搜尋某夥伴的排名 / 是否中獎
    actor: labor
    api: activity
    method: POST
    endpoint: /labor/ranking-list/search
    doc_id: 2103-2
    event: ""
    request:
      alias: labor_ranking_list                     # 活動別名（必填；happy 用文件預設別名）
      phone: "0912345678"                            # 查詢用電話（須合法手機格式；非參與者回 status=0 仍 success）
      id_number: A123456789                          # 身份證號（格式合法即可；非參與者回未中獎）
      type: 1                                        # 1 排行榜 / 2 特別獎
    push: null
    guards:
      - need: 打工夥伴已登入
        satisfy: {caps: [active]}
      - need: alias 對應的活動存在且已開始
        satisfy: {note: "happy 用進行中活動別名；不存在/未開始見 branches"}
    branches:
      - when: 電話號碼格式不正確
        expect_fail: {code: 9002, message_contains: "電話"}
        arrange: {note: "request.phone 給非法格式"}
      - when: 活動別名不存在
        expect_fail: {code: 9002, message_contains: "活動不存在"}
        arrange: {note: "request.alias 給不存在的別名"}
      - when: 活動未開始
        expect_fail: {code: 9002, message_contains: "活動未開始"}
        arrange: {note: "alias 指向尚未開始的活動"}
    side_effects: []                                # 唯讀，無 DB 變更
    notes: data.status=1 中獎/有排名，0 未中獎/無排名；type=2 不回 level/minutes。

