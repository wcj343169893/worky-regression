id: job-accept-1-of-2
description: >
  商家發佈工作(招募1人)→兩位不同打工夥伴各自申請→商家錄取其中一位，另一位仍停留在申請中。
  示範「簡單需求、實則多子任務」的正確拆分：
   · 身份：兩個不同 labor，由帳號池按 caps(verified/active/clean…) 配發，用例只宣告不指定 id；
   · 時段：前置清掉殘留「上工」工作(繞 30207 重疊 + 30229 同店同日)；
   · 上工要求：認證/未停權/無違規等硬狀態由帳號池保證(provision 階段校正)。
# 招募 1 人 → 錄取 1 位；第 2 位申請成功但不被錄取。
vars:
  job_recruit_count: 1

path:
# ── Phase 0 前置：發佈工作 ──────────────────────────────────────────────────
- transition: J1_employer_publish_job
  save:
    job_sn: job_sn_list.0
  expect:
    http: 200
    # 改打查詢接口驗證（取代讀 s_jobs.status）；info 不暴露 status，驗等價暴露欄位 recruited_count=0。
    api:
      query: Q_employer_job_info
      equals:
        recruited_count: 0              # 剛發佈、媒合中、尚無人錄取

# ── Phase 0：清確認工作的 db_exec 已移除（#4 執行期不碰 DB）─────────────────
# 原以 UPDATE s_labor_jobs status=8 清殘留上工工作以繞 30207 時段重疊 / 30229 同店同日。
# 改靠：帳號池 LRU 輪換（#1，配不同夥伴）+ runner 未來時段輪轉（每跑換時段）自然避開衝突；
# 偶發撞號時該次 30207/30229 失敗、可重跑（取捨見遷移記錄）。

# ── Phase 1 動作：兩位夥伴各自申請（bind 切換身份；商家收 10025）──────────────
# bind 讓 query 單元的 actor=labor 解析到該步綁定的夥伴；驗各自媒合清單該 job 的 status
- transition: J2_labor_apply
  bind: {labor: labor1}
  expect:
    http: 200
    push: {}
    api:
      query: Q_labor_job_matches
      find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
      equals:
        status: 4                       # STATUS_LABOR_APPLY（labor1 已申請）
- transition: J2_labor_apply
  bind: {labor: labor2}
  expect:
    http: 200
    push: {}
    api:
      query: Q_labor_job_matches
      find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
      equals:
        status: 4                       # STATUS_LABOR_APPLY（labor2 已申請）

# ── Phase 2 動作：商家錄取其中一位（labor1；收 EMPLOYER_ACCEPT_APPLY）──────────
- transition: J3_employer_accept
  bind: {labor: labor1}
  expect:
    http: 200
    push: {}
    # 改打 labor1 媒合清單驗錄取（取代讀 s_labor_jobs）：被錄取 → status=6
    api:
      query: Q_labor_job_matches
      find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
      equals:
        status: 6                       # STATUS_EMPLOYER_ACCEPT（商家已錄取＝上工）

# ── Phase 2 斷言：第二位未被錄取（等價：labor2 媒合為備取 16，而非錄取 6）──────────
# 原以 SQL 驗 s_labor_jobs 無紀錄；改打 labor2 自己的媒合清單，確認其狀態為備取(BACKUP=16)。
- assert_api:
    query: Q_labor_job_matches
    actor: labor2
    find: {in: matching, where: {job_sn: '{{state.job_sn}}'}}
    equals:
      status: 16                        # STATUS_BACKUP（申請成功但未獲錄取）
