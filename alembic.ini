# Alembic 設定（worky_qa_dashboard schema 遷移）。
# 連線 URL 不在這裡寫死：由 alembic/env.py 從 .env（Settings）動態組出，
# 所以 sqlalchemy.url 留空即可。

[alembic]
script_location = alembic
prepend_sys_path = src
# 遷移檔名加時間戳前綴，方便排序
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
